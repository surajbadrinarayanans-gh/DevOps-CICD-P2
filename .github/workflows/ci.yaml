name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install flake8 bandit

    - name: Lint Check (Flake8)
      run: flake8 app

    - name: Security Scan (Bandit)
      run: bandit -r app

    - name: Build Docker Image
      run: docker build -t transaction-service .

    - name: Install Trivy
      run: |
        sudo apt-get install -y wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install -y trivy

    - name: Scan Docker Image (Trivy)
      run: trivy image transaction-service

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build and Tag Image
      run: |
        docker build -t transaction-service .
        docker tag transaction-service:latest 389517403286.dkr.ecr.ap-south-1.amazonaws.com/transaction-service:latest

    - name: Push to ECR
      run: |
        docker push 389517403286.dkr.ecr.ap-south-1.amazonaws.com/transaction-service:latest